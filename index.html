<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="ico.png">
<title>VoidPulse</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#050505;
    color:#f3d9ff;
    font-family:Arial, Helvetica, sans-serif;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at top left, rgba(180,0,255,0.08), transparent 30%),
        radial-gradient(circle at bottom right, rgba(180,0,255,0.05), transparent 30%);
    z-index:-3;
}

.grid{
    position:fixed;
    inset:0;
    background-image:
        linear-gradient(rgba(180,0,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(180,0,255,0.04) 1px, transparent 1px);
    background-size:35px 35px;
    z-index:-2;
}

.particles{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:-1;
}

.particle{
    position:absolute;
    width:4px;
    height:4px;
    border-radius:50%;
    background:#c800ff;
    opacity:0.5;
    animation:float linear infinite;
}

@keyframes float{
    from{ transform:translateY(100vh); }
    to{ transform:translateY(-10vh); }
}

.lang-switcher{
    position:absolute;
    top:20px;
    right:20px;
    display:flex;
    gap:10px;
}

.lang-btn{
    background:#111;
    border:1px solid rgba(200,0,255,0.2);
    color:#f0b3ff;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.lang-btn.active{
    background:#c800ff;
    color:#000;
}

header{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px 20px;
    position:relative;
}

.hero{
    max-width:900px;
}

h1{
    font-size:5rem;
    color:#d84dff;
    letter-spacing:8px;
    text-shadow:0 0 18px #c800ff;
    margin-bottom:20px;
}

.subtitle{
    color:#efc3ff;
    line-height:1.8;
    font-size:1.15rem;
    margin-bottom:35px;
}

.buttons{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    gap:18px;
    margin-top:30px;
}

.btn{
    text-decoration:none;
    background:#c800ff;
    color:#000;
    padding:14px 28px;
    border-radius:12px;
    font-weight:bold;
    transition:0.2s ease;
    box-shadow:0 0 15px rgba(200,0,255,0.25);
}

.btn:hover{
    transform:translateY(-2px);
    background:#e46dff;
}

footer{
    text-align:center;
    padding:35px 15px;
    color:#d999ff;
    opacity:0.75;
}
</style>
</head>

<body>

<div class="grid"></div>

<div class="particles">
    <div class="particle" style="left:10%; animation-duration:12s;"></div>
    <div class="particle" style="left:20%; animation-duration:18s;"></div>
    <div class="particle" style="left:35%; animation-duration:14s;"></div>
    <div class="particle" style="left:50%; animation-duration:20s;"></div>
    <div class="particle" style="left:70%; animation-duration:16s;"></div>
    <div class="particle" style="left:85%; animation-duration:13s;"></div>
</div>

<header>

<div class="lang-switcher">
    <button class="lang-btn active" id="btn-pl" onclick="setLanguage('pl')">PL</button>
    <button class="lang-btn" id="btn-en" onclick="setLanguage('en')">EN</button>
</div>

<div class="hero">
    <h1>VOIDPULSE</h1>

    <div class="subtitle" id="subtitle">
        Mroczny bot muzyczny Discord.<br>
        Potężny, szybki i stworzony dla klimatu.
    </div>

    <div class="buttons">
        <a class="btn" href="TWÓJ_LINK_BOTA">Dodaj bota</a>
        <a class="btn" href="TWÓJ_DISCORD">Discord</a>
        <a class="btn" href="terms.html" id="terms-btn">Terms</a>
        <a class="btn" href="privacy.html" id="privacy-btn">Privacy</a>
        <a class="btn" href="inne-projekty.html" id="other-btn">Inne projekty</a>
    </div>
</div>

</header>

<footer>
© 2026 VoidPulse - by opilog12
</footer>

<script>
const translations = {
    pl:{
        subtitle:"Mroczny bot muzyczny Discord.<br>Potężny, szybki i stworzony dla klimatu.",
        other:"Inne projekty",
        terms:"Regulamin",
        privacy:"Prywatność"
    },
    en:{
        subtitle:"A dark Discord music bot.<br>Powerful, fast and built for atmosphere.",
        other:"Other projects",
        terms:"Terms",
        privacy:"Privacy"
    }
};

function setLanguage(lang){
    localStorage.setItem('selectedLang', lang);

    document.getElementById('btn-pl').classList.toggle('active', lang === 'pl');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');

    document.getElementById('subtitle').innerHTML = translations[lang].subtitle;
    document.getElementById('other-btn').innerText = translations[lang].other;
    document.getElementById('terms-btn').innerText = translations[lang].terms;
    document.getElementById('privacy-btn').innerText = translations[lang].privacy;

    document.documentElement.lang = lang;
}

window.addEventListener('DOMContentLoaded', () => {
    const savedLang = localStorage.getItem('selectedLang') || 'pl';
    setLanguage(savedLang);
});
</script>

</body>
</html>
