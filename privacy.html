<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="ico.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privacy Policy - VoidPulse</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    color:#f3d9ff;
    font-family:Arial, Helvetica, sans-serif;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at top left, rgba(180,0,255,0.08), transparent 30%),
        radial-gradient(circle at bottom right, rgba(180,0,255,0.05), transparent 30%);
    z-index:-3;
}

.grid{
    position:fixed;
    inset:0;
    background-image:
        linear-gradient(rgba(180,0,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(180,0,255,0.04) 1px, transparent 1px);
    background-size:35px 35px;
    z-index:-2;
}

.lang-switcher{
    position:absolute;
    top:20px;
    right:20px;
    display:flex;
    gap:10px;
}

.lang-btn{
    background:#111;
    border:1px solid rgba(200,0,255,0.2);
    color:#f0b3ff;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.lang-btn.active{
    background:#c800ff;
    color:#000;
}

.container{
    width:90%;
    max-width:1000px;
    margin:auto;
    padding:120px 20px;
}

.card{
    background:rgba(10,10,10,0.75);
    border:1px solid rgba(200,0,255,0.15);
    border-radius:18px;
    padding:35px;
}

h1{
    color:#d84dff;
    margin-bottom:25px;
    font-size:3rem;
    text-shadow:0 0 15px #c800ff;
}

p{
    line-height:1.9;
    margin-bottom:20px;
}
</style>
</head>

<body>

<div class="grid"></div>

<div class="lang-switcher">
    <button class="lang-btn active" id="btn-pl" onclick="setLanguage('pl')">PL</button>
    <button class="lang-btn" id="btn-en" onclick="setLanguage('en')">EN</button>
</div>

<div class="container">
<div class="card">

<h1 id="title">Privacy Policy</h1>

<p id="text1">
VoidPulse nie przechowuje danych osobowych poza informacjami wymaganymi do działania bota.
</p>

<p id="text2">
Wszystkie dane są wykorzystywane wyłącznie do funkcjonowania bota Discord.
</p>

</div>
</div>

<script>
const translations = {
    pl:{
        title:"Polityka prywatności",
        text1:"VoidPulse nie przechowuje danych osobowych poza informacjami wymaganymi do działania bota.",
        text2:"Wszystkie dane są wykorzystywane wyłącznie do funkcjonowania bota Discord."
    },
    en:{
        title:"Privacy Policy",
        text1:"VoidPulse does not store personal data except information required for bot functionality.",
        text2:"All data is used only for Discord bot functionality."
    }
};

function setLanguage(lang){
    localStorage.setItem('selectedLang', lang);

    document.getElementById('btn-pl').classList.toggle('active', lang === 'pl');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');

    document.getElementById('title').innerText = translations[lang].title;
    document.getElementById('text1').innerText = translations[lang].text1;
    document.getElementById('text2').innerText = translations[lang].text2;
}

window.addEventListener('DOMContentLoaded', () => {
    const savedLang = localStorage.getItem('selectedLang') || 'pl';
    setLanguage(savedLang);
});
</script>

</body>
</html>
