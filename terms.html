<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="ico.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terms of Service - VoidPulse</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    color:#f3d9ff;
    font-family:Arial, Helvetica, sans-serif;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at top left, rgba(180,0,255,0.08), transparent 30%),
        radial-gradient(circle at bottom right, rgba(180,0,255,0.05), transparent 30%);
    z-index:-3;
}

.grid{
    position:fixed;
    inset:0;
    background-image:
        linear-gradient(rgba(180,0,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(180,0,255,0.04) 1px, transparent 1px);
    background-size:35px 35px;
    z-index:-2;
}

.lang-switcher{
    position:absolute;
    top:20px;
    right:20px;
    display:flex;
    gap:10px;
}

.lang-btn{
    background:#111;
    border:1px solid rgba(200,0,255,0.2);
    color:#f0b3ff;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.lang-btn.active{
    background:#c800ff;
    color:#000;
}

.container{
    width:90%;
    max-width:1000px;
    margin:auto;
    padding:120px 20px;
}

.card{
    background:rgba(10,10,10,0.75);
    border:1px solid rgba(200,0,255,0.15);
    border-radius:18px;
    padding:35px;
}

h1{
    color:#d84dff;
    margin-bottom:25px;
    font-size:3rem;
    text-shadow:0 0 15px #c800ff;
}

p{
    line-height:1.9;
    margin-bottom:20px;
}
</style>
</head>

<body>

<div class="grid"></div>

<div class="lang-switcher">
    <button class="lang-btn active" id="btn-pl" onclick="setLanguage('pl')">PL</button>
    <button class="lang-btn" id="btn-en" onclick="setLanguage('en')">EN</button>
</div>

<div class="container">
<div class="card">

<h1 id="title">Terms of Service</h1>

<p id="text1">
Korzystając z VoidPulse zgadzasz się na używanie bota zgodnie z regulaminem Discorda.
</p>

<p id="text2">
Zabronione jest używanie bota do działań szkodliwych lub spamowania.
</p>

<p id="text3">
Bot jest dostarczany „as is” bez gwarancji działania.
</p>

</div>
</div>

<script>
const translations = {
    pl:{
        title:"Regulamin",
        text1:"Korzystając z VoidPulse zgadzasz się na używanie bota zgodnie z regulaminem Discorda.",
        text2:"Zabronione jest używanie bota do działań szkodliwych lub spamowania.",
        text3:"Bot jest dostarczany „as is” bez gwarancji działania."
    },
    en:{
        title:"Terms of Service",
        text1:"By using VoidPulse you agree to use the bot according to Discord Terms of Service.",
        text2:"Using the bot for harmful activities or spam is prohibited.",
        text3:"The bot is provided “as is” without warranty."
    }
};

function setLanguage(lang){
    localStorage.setItem('selectedLang', lang);

    document.getElementById('btn-pl').classList.toggle('active', lang === 'pl');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');

    document.getElementById('title').innerText = translations[lang].title;
    document.getElementById('text1').innerText = translations[lang].text1;
    document.getElementById('text2').innerText = translations[lang].text2;
    document.getElementById('text3').innerText = translations[lang].text3;
}

window.addEventListener('DOMContentLoaded', () => {
    const savedLang = localStorage.getItem('selectedLang') || 'pl';
    setLanguage(savedLang);
});
</script>

</body>
</html>
